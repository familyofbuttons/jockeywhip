<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Jockey Whip Races</title>

  <!-- FIXED: Correct filename (style.css, not styles.css) -->
  <link rel="stylesheet" href="style.css">

  <!-- Optional but recommended for PWAs -->
  <link rel="manifest" href="manifest.json">
</head>

<body>

  <header class="top-bar">
    <div class="brand-area">
      <img id="brandIcon" class="brand-icon" src="assets/jockey-icon.png" alt="">
      <span class="brand">Jockey Whip Races</span>
    </div>

    <div class="controls">
      <button id="nextRaceBtn" class="btn primary">Next Race</button>
      <button id="newMeetingBtn" class="btn ghost">New Meeting</button>

      <!-- Expert Mode toggle -->
      <button id="expertToggle" class="btn small ghost">Expert Mode: OFF</button>
    </div>
  </header>

  <div class="main-grid">

    <!-- LEFT COLUMN -->
    <div class="left-col">
      <h2>Players</h2>
      <div id="playersList"></div>

      <div class="player-controls">
        <button id="addPlayerBtn" class="btn small">Add Player</button>
        <button id="resetPlayersBtn" class="btn small ghost">Reset Players</button>
      </div>

      <h3>Bet Slip</h3>
      <div class="bet-slip">
        <div class="bet-row">
          <label>Horse</label>
          <select id="betHorse"></select>
        </div>

        <div class="bet-row">
          <label>Type</label>
          <select id="betType">
            <option value="win">Win</option>
            <option value="eachway">Each Way</option>
          </select>
        </div>

        <div class="bet-row">
          <label>Stake</label>
          <input id="betStake" type="number" value="5" min="5">
          <button id="stakeMinus" class="btn tiny ghost">-</button>
          <button id="stakePlus" class="btn tiny ghost">+</button>
        </div>

        <div id="stakePills" class="stake-pills">
          <div class="pill-stake" data-value="5">£5</div>
          <div class="pill-stake" data-value="10">£10</div>
          <div class="pill-stake" data-value="20">£20</div>
        </div>

        <div id="betCost" class="meta">Cost: £0</div>
        <div id="betEstimate" class="meta">Estimate: £0</div>

        <button id="placeBetBtn" class="btn primary">Place Bet</button>
        <button id="nextPlayerBtn" class="btn small ghost">Next Player</button>
      </div>

      <h3>Bets</h3>
      <div id="betsBox"></div>
    </div>

    <!-- CENTER COLUMN -->
    <div class="center-col">
      <h2 id="meetingTitle"></h2>
      <div id="raceInfo" class="meta"></div>
      <div id="raceMeta" class="meta"></div>

      <canvas id="raceCanvas"></canvas>

      <div class="race-controls">
        <button id="startRaceBtn" class="btn primary">Start Race</button>
        <button id="replayBtn" class="btn ghost">Replay</button>
      </div>
    </div>

    <!-- RIGHT COLUMN -->
    <div class="right-col">
      <h2>Racecard</h2>
      <div id="racecardList"></div>
    </div>

  </div>

  <!-- Settlement Modal -->
  <div id="settlementModal" class="modal hidden" aria-hidden="true">
    <div class="modal-content">
      <h3>Race Results</h3>
      <div id="settlementList"></div>
      <button id="settlementOk" class="btn primary">OK</button>
    </div>
  </div>

  <!-- Meeting Overlay -->
  <div id="meetingOverlay" class="overlay hidden" aria-hidden="true">
    <div id="overlayCard" class="overlay-card"></div>
  </div>

  <script src="app.js"></script>
  <script src="service-worker.js"></script>
</body>
</html>
